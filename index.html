<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Redirect</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            color: #eeeeee;
            margin-bottom: 5px;
        }
        p {
            color: #888888;
            font-size: 1rem;
            margin-top: 0;
        }
        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 24px;
            background-color: #9b59b6;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #8e44ad;
        }
        .spinner {
            width: 35px;
            height: 35px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: #9b59b6;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loader" class="spinner"></div>
    <h1 id="status">Connecting to server...</h1>
    <p id="subtext">Waiting for Roblox client</p>
    <div id="manual-btn-container"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const placeId = urlParams.get('placeId');
        const jobId = urlParams.get('jobId');
        
        if (placeId && jobId) {
            const deepLink = `roblox://experiences/start?placeId=${placeId}&gameInstanceId=${jobId}`;
            window.location.href = deepLink;
            
            setTimeout(() => {
                document.getElementById('manual-btn-container').innerHTML = 
                    `<a href="${deepLink}" class="btn">Launch Game</a>`;
            }, 2000);
        } else {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('status').innerText = "Invalid Session";
            document.getElementById('subtext').innerText = "No server information was provided in the URL.";
        }
    </script>
</body>
</html>
