<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyriox Auto-Join</title>
    <style>
        body {
            background-color: #0f0f11;
            color: #9b59b6; /* Vibrant Purple */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            color: #aaaaaa;
            font-size: 1.2rem;
        }
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background-color: transparent;
            color: #9b59b6;
            border: 2px solid #9b59b6;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #9b59b6;
            color: #0f0f11;
        }
    </style>
</head>
<body>
    <h1 id="status">🚀 Launching Roblox...</h1>
    <p>Please click "Open Roblox" if prompted by your browser.</p>
    <div id="manual-btn-container"></div>

    <script>
        // 1. Grab the IDs from the URL link Discord gives us
        const urlParams = new URLSearchParams(window.location.search);
        const placeId = urlParams.get('placeId');
        const jobId = urlParams.get('jobId');
        
        if (placeId && jobId) {
            // 2. The Magic Code: Force the browser to open the Roblox App immediately
            const deepLink = `roblox://experiences/start?placeId=${placeId}&gameInstanceId=${jobId}`;
            window.location.href = deepLink;
            
            // 3. Fallback: If their popup blocked it, give them a giant purple button to click
            setTimeout(() => {
                document.getElementById('manual-btn-container').innerHTML = 
                    `<a href="${deepLink}" class="btn">Click Here to Join Manually</a>`;
            }, 2500);
        } else {
            // Error handling if someone clicks a broken link
            document.getElementById('status').innerText = "❌ Invalid Pyriox Link";
            document.querySelector('p').innerText = "This link is missing a Server ID.";
        }
    </script>
</body>
</html>
